# ScrollMe reverse proxy: public :8080 -> Python aiohttp/Socket.IO on 127.0.0.1:8081.
# Shares the box with CityLeaks, which owns :80 and :443 as the default server;
# ScrollMe lives on its own port so the two never collide. Plain IP over HTTP for
# now — audiences hit  http://<server-ip>:8080  and TD connects to  ws://<server-ip>:8080/ws.
#
# To add a domain + HTTPS later: give this block a real server_name, then run
#   certbot --nginx -d scrollme.example.com
# (certbot will add a :443 block); after that phones use https:// and TD uses wss://.

server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    client_max_body_size 2m;

    # Socket.IO (phones, and TD if it uses a SocketIO DAT) — needs the Upgrade handshake.
    location /socket.io/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Keep idle sockets alive (TD may sit connected between reels for a long time).
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Raw WebSocket for TouchDesigner (the primary internet path to TD).
    location /ws {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Everything else: phone client (index.html), performer console (/admin), static, /healthz.
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
