# ScrollMe reverse proxy -> Python aiohttp/Socket.IO on 127.0.0.1:8081.
#
# Listens on BOTH :80 and :8080. Port 80 is the important one: exhibition / guest
# Wi-Fi networks routinely block odd ports like 8080 but always allow 80 (HTTP),
# so audiences + TD must reach the box on 80. We share :80 with CityLeaks safely
# by matching the box's IP as the Host — requests to http://<ip>/ hit ScrollMe,
# while cityleaks.space (matched by its own server_name) and everything else
# stay with CityLeaks' default_server. No CityLeaks config change, no domain.
#
#   Audience:  http://167.233.102.255            TD:  ws://167.233.102.255  (port 80)
#   (port 8080 still works too, e.g. on networks that allow it.)
#
# To add HTTPS later: point a domain here and run certbot (adds a :443 block).

# Sets Connection: upgrade only when the client actually requests a WebSocket
# upgrade, otherwise Connection: close (keeps normal HTTP keep-alive sane). Named
# uniquely so it can never collide with CityLeaks' config in the http context.
map $http_upgrade $scrollme_conn_upgrade {
    default upgrade;
    ''      close;
}

server {
    # Port 80 matched by the box IP (so it beats CityLeaks' default_server for
    # http://<ip>/ without touching CityLeaks), plus 8080 as a fallback.
    listen 80;
    listen [::]:80;
    listen 8080;
    listen [::]:8080;
    server_name 167.233.102.255;

    client_max_body_size 2m;

    # Socket.IO (phones, and TD if it uses a SocketIO DAT) — needs the Upgrade handshake.
    location /socket.io/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Keep idle sockets alive (TD may sit connected between reels for a long time).
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Raw WebSocket for TouchDesigner (the primary internet path to TD).
    location /ws {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Everything else: phone client (index.html), performer console (/admin),
    # static, /healthz — AND a WebSocket upgrade on the root path itself, because
    # TouchDesigner's WebSocket DAT can only target host:port (root, no path).
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $scrollme_conn_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
