name: Deploy to Hetzner

# Redeploy on every push to main (and manual "Run workflow"). This is a Python
# app with no build step, so we just SSH in, pull, sync the venv, and PM2-restart.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Never run two deploys at once; cancel an in-progress one if a newer push lands.
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pull, install deps, restart
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" bash -s <<'REMOTE'
            set -e
            cd /opt/scrollme
            git fetch --depth=1 origin main
            git reset --hard origin/main
            ./.venv/bin/pip install -r requirements.txt
            # Load the box's env (e.g. ADMIN_TOKEN from /etc/environment) so it's
            # passed through to PM2, then (re)start FROM the ecosystem file so its
            # `env` block is actually RE-APPLIED. A plain `pm2 restart <name>` does
            # NOT re-read the ecosystem file, so changes there (e.g. the swipe
            # threshold) would otherwise never reach the running process — they'd
            # stay baked in from the very first `pm2 start`. startOrReload re-reads
            # the file every deploy.
            set -a; [ -f /etc/environment ] && . /etc/environment; set +a
            pm2 startOrReload deploy/ecosystem.config.cjs --update-env
            pm2 save
            sleep 1
            curl -fsS http://127.0.0.1:8081/healthz && echo "  <- healthz OK"
          REMOTE
