<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScrollMe — Performer Console</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh; background: #0b0b0d; color: #eaeaea;
            font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; justify-content: center; padding: 24px;
        }
        .wrap { width: 100%; max-width: 460px; }
        h1 { font-size: 18px; font-weight: 600; margin: 0 0 4px; }
        .sub { color: #8a8a92; font-size: 13px; margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: #9a9aa2; margin: 14px 0 5px; text-transform: uppercase; letter-spacing: .04em; }
        input, textarea {
            width: 100%; background: #17171b; border: 1px solid #2a2a31; color: #eaeaea;
            border-radius: 8px; padding: 10px 12px; font: inherit; font-size: 14px;
        }
        textarea { font-family: ui-monospace, "SF Mono", Menlo, monospace; min-height: 64px; resize: vertical; }
        button {
            width: 100%; border: 0; border-radius: 8px; padding: 14px; margin-top: 10px;
            font: inherit; font-weight: 600; cursor: pointer; color: #fff; background: #3b3bff;
        }
        button.big { padding: 20px; font-size: 17px; background: #d6003c; margin-top: 4px; }
        button:active { transform: translateY(1px); }
        button.secondary { background: #26262e; }
        .row { display: flex; gap: 8px; }
        .row button { margin-top: 0; }
        .card { background: #131317; border: 1px solid #232329; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        #log { font-family: ui-monospace, Menlo, monospace; font-size: 12px; color: #7fd48a;
               background: #0f0f12; border: 1px solid #232329; border-radius: 8px; padding: 10px;
               min-height: 44px; white-space: pre-wrap; word-break: break-word; }
        .err { color: #ff7a7a !important; }
    </style>
</head>

<body>
    <div class="wrap">
        <h1>ScrollMe — Performer Console</h1>
        <div class="sub">Fire events at TouchDesigner &amp; phones. Everything routes through <code>/admin/event</code>.</div>

        <div class="card">
            <button class="big" onclick="send('trigger_scroll', {action:'next_reel'})">▲ NEXT REEL &nbsp;(trigger_scroll)</button>
            <div class="row" style="margin-top:10px">
                <button class="secondary" onclick="send('reset', {})">reset</button>
                <button class="secondary" onclick="send('flash', {})">flash</button>
                <button class="secondary" onclick="send('blackout', {})">blackout</button>
            </div>
        </div>

        <div class="card">
            <label for="tok">Admin token (if the server requires one)</label>
            <input id="tok" type="password" placeholder="leave blank if open" autocomplete="off">

            <label for="type">Custom event type</label>
            <input id="type" placeholder="e.g. set_intensity" value="">

            <label for="payload">Payload (JSON)</label>
            <textarea id="payload">{}</textarea>

            <button onclick="sendCustom()">Send custom event</button>
        </div>

        <div id="log">ready.</div>
    </div>

    <script>
        const log = document.getElementById('log');
        function print(msg, isErr) {
            log.textContent = new Date().toLocaleTimeString() + '  ' + msg;
            log.classList.toggle('err', !!isErr);
        }
        async function send(type, payload) {
            const token = document.getElementById('tok').value.trim();
            try {
                const res = await fetch('/admin/event', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', ...(token ? { 'X-Admin-Token': token } : {}) },
                    body: JSON.stringify({ type, payload })
                });
                const data = await res.json();
                if (!res.ok) return print('✗ ' + (data.error || res.status), true);
                print('✓ sent "' + type + '"  ' + JSON.stringify(payload));
            } catch (e) { print('✗ ' + e.message, true); }
        }
        function sendCustom() {
            const type = document.getElementById('type').value.trim();
            if (!type) return print('✗ enter an event type', true);
            let payload = {};
            try { payload = JSON.parse(document.getElementById('payload').value || '{}'); }
            catch (e) { return print('✗ payload is not valid JSON', true); }
            send(type, payload);
        }
    </script>
</body>

</html>
