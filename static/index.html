<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Collective Scroll</title>
    <link rel="stylesheet" href="static/style.css">
    <!-- Socket.IO 4.x client (matches python-socketio 5.x on the server). TD does
         NOT use this — it connects via the raw WebSocket /ws path. -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <script src="static/app.js" defer></script>
</head>

<body>
    <!-- Default stage screen: white with centered text -->
    <div id="screen-text" class="screen">
        <div id="main-text">Scroll me</div>
    </div>

    <!-- Stage screen: full-bleed image -->
    <div id="screen-image" class="screen hidden">
        <img id="stage-image" alt="">
    </div>

    <!-- Poll overlay: question + two options -->
    <div id="screen-poll" class="screen hidden">
        <div id="poll-question"></div>
        <div id="poll-options">
            <button class="poll-opt" data-i="0"></button>
            <button class="poll-opt" data-i="1"></button>
        </div>
    </div>

    <!-- One-at-a-time solo-scroll overlay: green when chosen, white otherwise -->
    <div id="screen-solo" class="screen hidden">
        <div id="solo-text"></div>
    </div>

    <!-- Finale slideshow: cycling images with an overlay plea -->
    <div id="screen-slideshow" class="screen hidden">
        <img id="slide-image" alt="">
        <div id="slide-overlay"></div>
    </div>
</body>

</html>
